services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docpassword}
      POSTGRES_DB: ${POSTGRES_DB:-docprocessing}
    volumes:
      - ./data_warehouses/postgres:/var/lib/postgresql/data
    ports:
      - "54344:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docuser} -d ${POSTGRES_DB:-docprocessing}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis/redis-stack:latest
    container_name: redis_stack
    restart: unless-stopped
    ports:
      - "6390:6379"
      - "8096:8001"
    volumes:
      - ./data_warehouses/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data_warehouses/uploads:/app/uploads
      - ./data_warehouses/celery_logs:/app/core/logging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    env_file: .env
    volumes:
      - ./data_warehouses/uploads:/app/uploads
      - ./data_warehouses/celery_logs:/app/core/logging
      - ./data_warehouses/hf_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=2
    healthcheck:
      test: ["CMD-SHELL", "celery -A worker.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  flower:
    image: mher/flower:2.0
    restart: always
    environment:
      CELERY_BROKER_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "5555:5555"
    volumes:
      - ./data_warehouses/flower:/data
    depends_on:
      - redis
